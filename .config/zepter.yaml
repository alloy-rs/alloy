version:
  format: 1
  # Minimum zepter version that is expected to work. This is just for printing a nice error
  # message when someone tries to use an older version.
  binary: 0.13.2

# The examples in the following comments assume crate `A` to have a dependency on crate `B`.
workflows:
  check:
    - [
        "lint",
        # Check that `A` activates the features of `B`.
        "propagate-feature",
        # These are all workspace features except `default`; forwarding `default` would activate dependency defaults.
        "--features=admin,admin-api,alloy-eip7702,alloy-transport-http,alloy-transport-ipc,anvil,anvil-api,anvil-node,any,arbitrary,asm-keccak,aws-lc-rs,beacon,borsh,browser,consensus,consensus-secp256k1,contract,crypto-backend,debug,debug-api,dyn-abi,eip712,eip7702,eips,engine,engine-api,ens,erc4337-api,essentials,eth,full,genesis,getrandom,hyper,hyper-tls,ipc,json,json-abi,json-rpc,jwt,jwt-auth,jwt-aws-lc-rs,k256,keystore,keystore-geth-compat,kzg,kzg-sidecar,map,map-fxhash,map-hashbrown,map-indexmap,mev,mev-api,mnemonic,mnemonic-all-languages,mock,more-tuple-impls,native-keccak,native-tls,net-api,network,node,node-bindings,postgres,provider,provider-admin-api,provider-anvil-api,provider-anvil-node,provider-debug-api,provider-engine-api,provider-http,provider-ipc,provider-mev-api,provider-net-api,provider-trace-api,provider-txpool-api,provider-ws,provider-ws-native-tls,provider-ws-ring,providers,pubsub,rand,reqwest,reqwest-default-tls,reqwest-native-tls,reqwest-rustls-tls,ring,rlp,rpc,rpc-api,rpc-client,rpc-client-ipc,rpc-client-ws,rpc-client-ws-native-tls,rpc-client-ws-ring,rpc-types,rpc-types-admin,rpc-types-anvil,rpc-types-any,rpc-types-beacon,rpc-types-debug,rpc-types-engine,rpc-types-eth,rpc-types-mev,rpc-types-trace,rpc-types-txpool,rustls-tls,secp256k1,serde,serde-bincode-compat,serde_with,sha2,sha3-keccak,signer-aws,signer-gcp,signer-keystore,signer-keystore-geth-compat,signer-ledger,signer-ledger-browser,signer-ledger-node,signer-local,signer-mnemonic,signer-mnemonic-all-languages,signer-trezor,signer-turnkey,signer-yubihsm,signers,sol-types,ssz,std,tenderly-admin-api,tenderly-api,throttle,tiny-keccak,trace,trace-api,traceparent,transport-http,transport-ipc,transport-ipc-mock,transport-throttle,transport-ws,transport-ws-base,transport-ws-native-tls,transport-ws-ring,transports,trie,txpool,txpool-api,wasm-bindgen,ws,ws-base,ws-native-tls,ws-ring,yubihsm,zeroize",
        # Do not try to add a new section into `[features]` of `A` only because `B` exposes that feature. There are edge-cases where this is still needed, but we can add them manually.
        "--left-side-feature-missing=ignore",
        # Ignore the case that `A` is outside of the workspace. Otherwise it will report errors in external dependencies that we have no influence on.
        "--left-side-outside-workspace=ignore",
        # Only check normal dependencies. 
        # Propagating to dev-dependencies leads to compilation issues: https://github.com/alloy-rs/alloy/pull/2144#issuecomment-2702291349
        "--dep-kinds=normal:check,dev:ignore",
        "--show-path",
        "--quiet",
      ]
  default:
    # Running `zepter` with no subcommand will check & fix.
    - [$check.0, "--fix"]

# Will be displayed when any workflow fails:
help:
  text: |
    Alloy uses the Zepter CLI to detect abnormalities in Cargo features, e.g. missing propagation.

    It looks like one more checks failed; please check the console output.

    You can try to automatically address them by installing zepter (`cargo install zepter --locked`) and simply running `zepter` in the workspace root.
  links:
    - "https://github.com/ggwpez/zepter"
